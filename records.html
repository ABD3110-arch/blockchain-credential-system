<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CredentialChain — All Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0a0a0f;
      --bg-card:    #111118;
      --bg-input:   #16161f;
      --border:     #2a2a3e;
      --border-hi:  #4a4a6e;
      --accent:     #7c3aed;
      --accent-hi:  #a855f7;
      --accent-glow:#7c3aed44;
      --green:      #10b981;
      --green-glow: #10b98120;
      --red:        #ef4444;
      --red-glow:   #ef444420;
      --amber:      #f59e0b;
      --amber-glow: #f59e0b20;
      --text:       #e2e8f0;
      --text-dim:   #64748b;
      --text-faint: #1e293b;
      --mono:       'Space Mono', monospace;
      --sans:       'Syne', sans-serif;
      --radius:     8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
      pointer-events: none; z-index: 999;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 26px; height: 26px;
      background: var(--accent);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    .logo span { color: var(--accent-hi); }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hi); box-shadow: 0 3px 14px var(--accent-glow); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

    .btn-export {
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
    }
    .btn-export:hover { background: var(--green-glow); }

    /* ── MAIN ── */
    main { padding: 24px 28px; }

    /* ── PAGE HEADER ── */
    .page-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .page-title h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 3px;
    }

    .page-title p { color: var(--text-dim); font-size: 13px; }

    .top-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

    /* ── SUMMARY STRIP ── */
    .summary-strip {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .summary-item {
      flex: 1;
      background: var(--bg-card);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .summary-item:hover { background: var(--bg-input); }
    .summary-item.active-filter { background: var(--accent-glow); }

    .summary-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-item.s-all    .summary-dot { background: var(--accent-hi); }
    .summary-item.s-active .summary-dot { background: var(--green); }
    .summary-item.s-revoked .summary-dot { background: var(--red); }

    .summary-count {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .summary-item.s-all     .summary-count { color: var(--accent-hi); }
    .summary-item.s-active  .summary-count { color: var(--green); }
    .summary-item.s-revoked .summary-count { color: var(--red); }

    .summary-label {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 400px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      transition: all 0.15s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-wrap input::placeholder { color: var(--text-dim); }

    .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 14px;
      pointer-events: none;
    }

    .filter-select {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus { border-color: var(--accent); }

    .result-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── TABLE ── */
    .table-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 11px;
    }

    thead th {
      background: var(--bg-input);
      padding: 11px 14px;
      text-align: left;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
      transition: color 0.13s;
    }

    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--accent-hi); }
    thead th .sort-arrow { margin-left: 4px; opacity: 0.5; font-size: 10px; }
    thead th.sorted .sort-arrow { opacity: 1; color: var(--accent-hi); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(124,58,237,0.05); }

    tbody td {
      padding: 11px 14px;
      color: var(--text-dim);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    tbody td.td-status { white-space: nowrap; }
    tbody td.td-hash   { max-width: 160px; color: var(--text-faint); font-size: 10px; }
    tbody td.td-ipfs a { color: var(--accent-hi); text-decoration: none; }
    tbody td.td-ipfs a:hover { text-decoration: underline; }
    tbody td.td-date   { white-space: nowrap; }
    tbody td.td-issuer { font-size: 10px; }
    tbody td.td-actions { white-space: nowrap; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border: 1px solid;
    }

    .badge::before { content: '●'; font-size: 8px; }

    .badge-active  { background: var(--green-glow); color: var(--green); border-color: var(--green); }
    .badge-revoked { background: var(--red-glow);   color: var(--red);   border-color: var(--red); }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 4px;
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.12s;
      margin-right: 4px;
    }

    .action-btn:hover { border-color: var(--accent); color: var(--accent-hi); }
    .action-btn.revoke-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── EMPTY / LOADING ── */
    .table-empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-dim);
    }

    .table-empty .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .table-empty p { font-size: 13px; }

    .spinner-row td {
      padding: 40px;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-hi);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DETAIL PANEL ── */
    .detail-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .detail-overlay.open { display: flex; }

    .detail-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 580px;
      max-height: 90vh;
      overflow-y: auto;
      animation: panelIn 0.2s ease;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-header h2 { font-size: 16px; font-weight: 800; }

    .close-btn {
      background: none; border: none;
      color: var(--text-dim); font-size: 20px;
      cursor: pointer; line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.12s;
    }

    .close-btn:hover { color: var(--text); }

    .detail-body { padding: 24px; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-field { display: flex; flex-direction: column; gap: 4px; }
    .detail-field.full { grid-column: span 2; }
    .detail-field label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .detail-field .val {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      word-break: break-all;
      line-height: 1.6;
    }

    .detail-field .val a { color: var(--accent-hi); text-decoration: none; }
    .detail-field .val a:hover { text-decoration: underline; }

    .detail-divider { height: 1px; background: var(--border); margin: 20px 0; grid-column: span 2; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 500;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-family: var(--mono);
      font-size: 12px;
      display: none;
      animation: slideIn 0.2s ease;
    }

    #toast.show { display: flex; align-items: center; gap: 8px; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }

    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">⛓</div>
    Credential<span>Chain</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="window.location.href='index.html'">← Admin Dashboard</button>
    <button class="btn btn-export" onclick="exportCSV()">⇩ Export CSV</button>
    <button class="btn btn-primary" onclick="loadAll()">↺ Refresh</button>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- Page Header -->
  <div class="page-top">
    <div class="page-title">
      <h1>All Credential Records</h1>
      <p>Complete on-chain registry — all issued, updated, and revoked credentials</p>
    </div>
  </div>

  <!-- Summary Strip -->
  <div class="summary-strip">
    <div class="summary-item s-all active-filter" onclick="setFilter('all', this)">
      <div class="summary-dot"></div>
      <div>
        <div class="summary-count" id="countAll">–</div>
        <div class="summary-label">Total</div>
      </div>
    </div>
    <div class="summary-item s-active" onclick="setFilter('active', this)">
      <div class="summary-dot"></div>
      <div>
        <div class="summary-count" id="countActive">–</div>
        <div class="summary-label">Active</div>
      </div>
    </div>
    <div class="summary-item s-revoked" onclick="setFilter('revoked', this)">
      <div class="summary-dot"></div>
      <div>
        <div class="summary-count" id="countRevoked">–</div>
        <div class="summary-label">Revoked</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="searchInput" placeholder="Search IPFS CID, issuer, hash…" oninput="renderTable()">
    </div>
    <select class="filter-select" id="sortSelect" onchange="renderTable()">
      <option value="issuedAt-desc">Newest First</option>
      <option value="issuedAt-asc">Oldest First</option>
      <option value="status-asc">Status (Active First)</option>
      <option value="status-desc">Status (Revoked First)</option>
      <option value="updatedAt-desc">Last Updated</option>
    </select>
    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="toggleSort('index')">#<span class="sort-arrow" id="arrow-index"></span></th>
            <th>Status</th>
            <th onclick="toggleSort('ipfsCid')">IPFS CID<span class="sort-arrow" id="arrow-ipfsCid"></span></th>
            <th onclick="toggleSort('issuedAt')">Issued At<span class="sort-arrow" id="arrow-issuedAt"></span></th>
            <th onclick="toggleSort('updatedAt')">Updated At<span class="sort-arrow" id="arrow-updatedAt"></span></th>
            <th>Issuer Address</th>
            <th>Data Hash</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="spinner-row"><td colspan="8"><span class="spinner"></span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <h2 id="detailTitle">Credential Details</h2>
      <button class="close-btn" onclick="closeDetailPanel()">×</button>
    </div>
    <div class="detail-body">
      <div class="detail-grid" id="detailGrid"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = 'http://localhost:3001/api';
const PINATA = 'https://gateway.pinata.cloud/ipfs/';

// ── STATE ────────────────────────────────
let allCredentials  = [];
let filtered        = [];
let activeFilter    = 'all';
let sortKey         = 'issuedAt';
let sortDir         = 'desc';

// ── INIT ─────────────────────────────────
async function loadAll() {
  document.getElementById('tableBody').innerHTML =
    '<tr class="spinner-row"><td colspan="8"><span class="spinner"></span></td></tr>';

  try {
    const res  = await fetch(`${API}/credentials/all`);
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || 'Failed to load');

    allCredentials = data.credentials || [];

    document.getElementById('countAll').textContent     = data.total   ?? 0;
    document.getElementById('countActive').textContent  = data.active  ?? 0;
    document.getElementById('countRevoked').textContent = data.revoked ?? 0;

    renderTable();

  } catch (err) {
    document.getElementById('tableBody').innerHTML = `
      <tr><td colspan="8">
        <div class="table-empty">
          <div class="empty-icon">⚠</div>
          <p>Failed to load: ${err.message}</p>
        </div>
      </td></tr>`;
    toast('Error: ' + err.message, 'error');
  }
}

// ── FILTER ───────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.summary-item').forEach(s => s.classList.remove('active-filter'));
  el.classList.add('active-filter');
  renderTable();
}

// ── SORT ─────────────────────────────────
function toggleSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortDir = 'desc';
  }
  updateSortArrows();
  renderTable();
}

function updateSortArrows() {
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  const arrow = document.getElementById('arrow-' + sortKey);
  if (arrow) {
    arrow.closest('th').classList.add('sorted');
    arrow.textContent = sortDir === 'asc' ? ' ↑' : ' ↓';
  }
}

// ── RENDER ───────────────────────────────
function renderTable() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();

  // Filter by status
  let data = allCredentials.filter(c => {
    if (activeFilter === 'active')  return c.status === 'Active';
    if (activeFilter === 'revoked') return c.status === 'Revoked';
    return true;
  });

  // Filter by search
  if (query) {
    data = data.filter(c =>
      (c.ipfsCid    && c.ipfsCid.toLowerCase().includes(query))   ||
      (c.issuer     && c.issuer.toLowerCase().includes(query))     ||
      (c.dataHash   && c.dataHash.toLowerCase().includes(query))   ||
      (c.bytes32Id  && c.bytes32Id.toLowerCase().includes(query))  ||
      (c.status     && c.status.toLowerCase().includes(query))
    );
  }

  // Sort
  const sortVal = document.getElementById('sortSelect').value;
  const [sk, sd] = sortVal.split('-');
  data.sort((a, b) => {
    let va = a[sk] || '';
    let vb = b[sk] || '';
    if (sk === 'issuedAt' || sk === 'updatedAt') {
      va = va ? new Date(va).getTime() : 0;
      vb = vb ? new Date(vb).getTime() : 0;
    }
    if (sk === 'status') {
      va = a.statusNum;
      vb = b.statusNum;
    }
    if (va < vb) return sd === 'asc' ? -1 : 1;
    if (va > vb) return sd === 'asc' ? 1 : -1;
    return 0;
  });

  filtered = data;
  document.getElementById('resultCount').textContent =
    `${data.length} / ${allCredentials.length} records`;

  const tbody = document.getElementById('tableBody');

  if (data.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="8">
        <div class="table-empty">
          <div class="empty-icon">📭</div>
          <p>${allCredentials.length === 0 ? 'No credentials have been issued yet.' : 'No records match your search.'}</p>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = data.map((cred, i) => {
    const statusBadge = cred.status === 'Active'
      ? '<span class="badge badge-active">Active</span>'
      : '<span class="badge badge-revoked">Revoked</span>';

    const issuedDate  = cred.issuedAt  ? fmtDate(cred.issuedAt)  : '—';
    const updatedDate = cred.updatedAt ? fmtDate(cred.updatedAt) : '—';

    const shortCid    = cred.ipfsCid ? cred.ipfsCid.slice(0,14) + '…' : '—';
    const shortHash   = cred.dataHash ? cred.dataHash.slice(0,18) + '…' : '—';
    const shortIssuer = cred.issuer   ? cred.issuer.slice(0,8) + '…' + cred.issuer.slice(-6) : '—';

    const revokeBtn = cred.status === 'Active'
      ? `<button class="action-btn revoke-btn" onclick="quickRevoke(event, '${cred.bytes32Id}', ${i})">Revoke</button>`
      : '';

    return `
      <tr>
        <td style="color:var(--text-dim)">${i + 1}</td>
        <td class="td-status">${statusBadge}</td>
        <td class="td-ipfs">
          ${cred.ipfsCid
            ? `<a href="${cred.ipfsUrl}" target="_blank" rel="noopener" title="${cred.ipfsCid}">${shortCid}</a>`
            : '—'}
        </td>
        <td class="td-date">${issuedDate}</td>
        <td class="td-date">${updatedDate}</td>
        <td class="td-issuer" title="${cred.issuer || ''}">${shortIssuer}</td>
        <td class="td-hash"   title="${cred.dataHash || ''}">${shortHash}</td>
        <td class="td-actions">
          <button class="action-btn" onclick="showDetail(${i})">View</button>
          ${revokeBtn}
        </td>
      </tr>`;
  }).join('');
}

// ── DETAIL PANEL ─────────────────────────
function showDetail(idx) {
  const cred = filtered[idx];
  if (!cred) return;

  document.getElementById('detailTitle').textContent = 'Credential Detail';

  const statusBadge = cred.status === 'Active'
    ? '<span class="badge badge-active">Active</span>'
    : '<span class="badge badge-revoked">Revoked</span>';

  document.getElementById('detailGrid').innerHTML = `
    <div class="detail-field">
      <label>Status</label>
      <div class="val">${statusBadge}</div>
    </div>
    <div class="detail-field">
      <label>Issued At</label>
      <div class="val">${cred.issuedAt ? fmtDateFull(cred.issuedAt) : '—'}</div>
    </div>
    <div class="detail-field">
      <label>Last Updated</label>
      <div class="val">${cred.updatedAt ? fmtDateFull(cred.updatedAt) : '—'}</div>
    </div>
    <div class="detail-field">
      <label>Issuer Address</label>
      <div class="val">${cred.issuer || '—'}</div>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-field full">
      <label>IPFS CID</label>
      <div class="val">
        ${cred.ipfsCid
          ? `<a href="${cred.ipfsUrl}" target="_blank" rel="noopener">${cred.ipfsCid}</a>`
          : '—'}
      </div>
    </div>
    <div class="detail-field full">
      <label>Data Hash (SHA-256)</label>
      <div class="val">${cred.dataHash || '—'}</div>
    </div>
    <div class="detail-field full">
      <label>On-Chain ID (bytes32)</label>
      <div class="val">${cred.bytes32Id || '—'}</div>
    </div>
  `;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetailPanel();
}

// ── QUICK REVOKE ──────────────────────────
async function quickRevoke(e, bytes32Id, idx) {
  e.stopPropagation();
  const cred = filtered[idx];
  if (!cred) return;

  const confirmed = confirm(
    `Revoke this credential?\n\nThis action is PERMANENT and cannot be undone.\nOn-chain ID: ${bytes32Id.slice(0,20)}…`
  );
  if (!confirmed) return;

  try {
    // We need to use the bytes32Id directly — call a special admin endpoint
    const res  = await fetch(`${API}/credential/revoke-by-id`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bytes32Id })
    });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    toast('Credential revoked ✓', 'success');
    await loadAll();

  } catch (err) {
    toast('Revoke failed: ' + err.message, 'error');
  }
}

// ── EXPORT CSV ───────────────────────────
function exportCSV() {
  if (filtered.length === 0) { toast('No records to export', 'error'); return; }

  const headers = ['#','Status','IPFS CID','IPFS URL','Issued At','Updated At','Issuer Address','Data Hash','On-Chain ID'];
  const rows = filtered.map((c, i) => [
    i + 1,
    c.status,
    c.ipfsCid   || '',
    c.ipfsUrl   || '',
    c.issuedAt  ? fmtDateFull(c.issuedAt)  : '',
    c.updatedAt ? fmtDateFull(c.updatedAt) : '',
    c.issuer    || '',
    c.dataHash  || '',
    c.bytes32Id || ''
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\n');

  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `credential-registry-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`Exported ${filtered.length} records`, 'success');
}

// ── HELPERS ───────────────────────────────
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric'
  });
}

function fmtDateFull(iso) {
  return new Date(iso).toLocaleString('en-US', {
    year: 'numeric', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.className = `show ${type}`;
  el.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.className = '', 3500);
}

// Keyboard shortcut: Escape closes panel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetailPanel();
});

// ── START ─────────────────────────────────
loadAll();
</script>
</body>
</html>
